<style>
        body { font-family: 'Inter', sans-serif; }
        .font-headline { font-family: 'Manrope', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .editorial-shadow { box-shadow: 0 20px 32px -12px rgba(4, 22, 39, 0.06); }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col overflow-x-hidden">
<!-- <script>window.FINSIGHT_API_ORIGIN = "http://127.0.0.1:8000";</script> -->
<script src="../js/config.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/signup-page.js"></script>
<header class="w-full py-6 px-8 flex justify-between items-center z-50">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary flex items-center justify-center rounded-lg">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<span class="font-headline font-extrabold text-xl tracking-tight text-primary">Financial Atelier</span>
</div>
<a class="text-sm font-medium text-primary hover:underline" href="code.html">Back to sign in</a>
</header>
<main class="flex-grow flex items-center justify-center px-6 py-12">
<div class="w-full max-w-md glass-panel p-10 rounded-xl border border-outline-variant/20 editorial-shadow">
<div class="mb-8 text-center">
<h1 class="font-headline text-2xl font-bold text-primary mb-2">Create your account</h1>
<p class="text-sm text-on-surface-variant">Sign up with a username, email, and password (min. 8 characters).</p>
</div>
<form id="signup-form" class="space-y-5" novalidate>
<div id="signup-error" class="hidden rounded-lg bg-error-container text-on-error-container text-sm px-4 py-3 font-medium" role="alert"></div>
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="username">Username</label>
<input class="w-full px-4 py-3 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary text-sm" id="username" name="username" type="text" autocomplete="username" required placeholder="your_username"/>
</div>
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="email">Work Email</label>
<input class="w-full px-4 py-3 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary text-sm" id="email" name="email" type="email" autocomplete="email" required placeholder="you@company.com"/>
</div>
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="password">Password</label>
<input class="w-full px-4 py-3 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary text-sm" id="password" name="password" type="password" autocomplete="new-password" required placeholder="min. 8 characters"/>
</div>
<div class="space-y-1.5">
<label class="text-[11px] font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="password_confirm">Confirm password</label>
<input class="w-full px-4 py-3 bg-surface-container rounded-lg border-none focus:ring-2 focus:ring-primary text-sm" id="password_confirm" name="password_confirm" type="password" autocomplete="new-password" required/>
</div>
<button class="w-full bg-gradient-to-r from-primary to-primary-container text-white font-bold py-4 rounded-lg shadow-lg hover:opacity-95 transition-all disabled:opacity-60" id="signup-submit" type="submit">Create account</button>
</form>
</div>
</main>
</body>
</html>
